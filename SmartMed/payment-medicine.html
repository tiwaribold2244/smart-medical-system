<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartMed Pharmacy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#f4f7fb;}

.hero {
  background: linear-gradient(90deg,#0d6efd,#00c6ff);
  color:white;
  padding:40px;
  text-align:center;
}

.card {border-radius:15px; transition:0.3s;}
.card:hover {transform:translateY(-8px);}

.med-img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.cart-box {
  position:fixed;
  right:0; top:0;
  width:320px; height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  padding:15px; overflow:auto;
  display:none;
}
</style>
</head>

<body>

<div class="hero">
<h2>💊 SmartMed Pharmacy</h2>
<p>Affordable Medicines with Easy Checkout</p>
</div>

<div class="container my-4">

<div class="row">

<!-- ITEM -->
<div class="col-md-4 mb-4">
<div class="card p-3 text-center">
<img src="https://5.imimg.com/data5/SELLER/Default/2021/12/LK/ON/KX/43755673/paracetamol-500mg-tablet-1000x1000.jpg" class="med-img">
<h5>Paracetamol</h5>
<p>₹35</p>
<button class="btn btn-success" onclick="addCart('Paracetamol',35)">Add to Cart</button>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card p-3 text-center">
<img src="https://pics.walgreens.com/prodimg/369763/450.jpg" class="med-img">
<h5>Ibuprofen</h5>
<p>₹55</p>
<button class="btn btn-success" onclick="addCart('Ibuprofen',55)">Add to Cart</button>
</div>
</div>

</div>
</div>

<!-- CART -->
<div class="cart-box" id="cart">
<h5>🛒 Cart</h5>
<ul id="cartItems"></ul>
<h6>Total: ₹<span id="total">0</span></h6>

<button class="btn btn-success w-100 mt-2" onclick="openCheckout()">Checkout</button>
<button class="btn btn-danger w-100 mt-2" onclick="toggleCart()">Close</button>
</div>

<button class="btn btn-primary position-fixed bottom-0 end-0 m-4" onclick="toggleCart()">🛒</button>

<!-- CHECKOUT -->
<div class="modal fade" id="checkoutModal">
<div class="modal-dialog">
<div class="modal-content p-3">

<h5>Checkout</h5>

<input id="address" class="form-control mb-2" placeholder="Enter Address">

<select id="payment" class="form-control mb-2" onchange="handlePayment()">
<option value="">Select Payment</option>
<option value="upi">UPI</option>
<option value="cod">Cash</option>
</select>

<div id="upiBox" style="display:none; text-align:center;">
<p>Scan QR to Pay</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
</div>

<button class="btn btn-primary w-100 mt-3" onclick="placeOrder()">Place Order</button>

</div>
</div>
</div>

<script>

let total = 0;

/* Add to cart */
function addCart(name, price) {
  let li = document.createElement("li");
  li.innerText = name + " - ₹" + price;
  document.getElementById("cartItems").appendChild(li);

  total += price;
  document.getElementById("total").innerText = total;
}

/* Toggle cart */
function toggleCart() {
  let c = document.getElementById("cart");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* Open checkout */
function openCheckout() {
  if (total === 0) {
    alert("Cart is empty");
    return;
  }
  new bootstrap.Modal(document.getElementById('checkoutModal')).show();
}

/* Payment */
function handlePayment() {
  let p = document.getElementById("payment").value;
  document.getElementById("upiBox").style.display = (p === "upi") ? "block" : "none";
}

/* Place order */
function placeOrder() {
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  if (!address || !payment) {
    alert("Fill all details");
    return;
  }

  alert("✅ Order placed successfully!");

  document.getElementById("cartItems").innerHTML = "";
  document.getElementById("total").innerText = 0;
  total = 0;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
