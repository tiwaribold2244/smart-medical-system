<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find My Doctor | SmartMed</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {font-family:'Segoe UI'; background:#f4f7fb;}

.hero {
  background: linear-gradient(90deg,#0d6efd,#00c6ff);
  color:white;
  padding:40px;
  text-align:center;
}

.doctor-card {
  border-radius:15px;
  transition:0.3s;
}
.doctor-card:hover {
  transform:translateY(-8px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.doc-img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.status {
  font-size:12px;
  padding:5px 10px;
  border-radius:20px;
}
.available {background:#28a745; color:white;}
.busy {background:#dc3545; color:white;}

.rating {color:#ffc107;}
</style>
</head>

<body>

<div class="hero">
<h2>👨‍⚕️ Find Your Doctor</h2>
<p>Consult experienced doctors easily</p>
</div>

<div class="container my-4">

<input type="text" id="search" class="form-control mb-3" placeholder="Search doctor..." onkeyup="searchDoc()">

<div class="row">

<!-- Dr Ravi Sharma -->
<div class="col-md-4 mb-4 doc">
<div class="card doctor-card p-3 text-center">
<img src="https://www.felixhospital.com/sites/default/files/2025-02/Ravi-Sharma.webp" class="doc-img">
<h5>Dr. Ravi Sharma</h5>
<p>General Physician</p>
<span class="status available">Available</span>
<p class="rating">⭐⭐⭐⭐☆</p>
<button class="btn btn-success btn-sm mt-2" onclick="openBooking('Dr. Ravi Sharma')">Book</button>
<button class="btn btn-outline-primary btn-sm mt-2" onclick="showProfile('ravi')">Profile</button>
</div>
</div>

<!-- Dr Gaurav Verma -->
<div class="col-md-4 mb-4 doc">
<div class="card doctor-card p-3 text-center">
<img src="https://medifyhome.com/wp-content/uploads/2024/04/gv.jpg" class="doc-img">
<h5>Dr. Gaurav Verma</h5>
<p>Cardiologist</p>
<span class="status busy">Busy</span>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button class="btn btn-success btn-sm mt-2" onclick="openBooking('Dr. Gaurav Verma')">Book</button>
<button class="btn btn-outline-primary btn-sm mt-2" onclick="showProfile('verma')">Profile</button>
</div>
</div>

<!-- Dr Sanjit Singh -->
<div class="col-md-4 mb-4 doc">
<div class="card doctor-card p-3 text-center">
<img src="https://d35oenyzp35321.cloudfront.net/sanjit_singh_dental_4eae23d93b.jpg" class="doc-img">
<h5>Dr. Sanjit Singh</h5>
<p>Dentist</p>
<span class="status available">Available</span>
<p class="rating">⭐⭐⭐⭐☆</p>
<button class="btn btn-success btn-sm mt-2" onclick="openBooking('Dr. Sanjit Singh')">Book</button>
<button class="btn btn-outline-primary btn-sm mt-2" onclick="showProfile('sanjit')">Profile</button>
</div>
</div>

</div>

</div>

<!-- Profile Modal -->
<div class="modal fade" id="profileModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5 id="docTitle"></h5>
<p id="docDetails"></p>
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
</div>
</div>
</div>

<!-- Booking Modal -->
<div class="modal fade" id="bookingModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5 id="bookDoc"></h5>

<label>Select Date:</label>
<input type="date" class="form-control mb-2">

<label>Select Time:</label>
<select class="form-control mb-3">
<option>10:00 AM</option>
<option>12:00 PM</option>
<option>3:00 PM</option>
<option>6:00 PM</option>
</select>

<button class="btn btn-success" onclick="confirmBooking()">Confirm</button>
</div>
</div>
</div>

<script>

/* Search */
function searchDoc(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".doc").forEach(d=>{
d.style.display = d.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* Profile Data */
function showProfile(type){

let data = {
ravi: "MBBS, 10+ years experience in general medicine.",
verma: "Cardiologist with 15+ years experience in heart diseases.",
sanjit: "Dental specialist with 12+ years experience."
};

document.getElementById("docTitle").innerText = "Doctor Profile";
document.getElementById("docDetails").innerText = data[type];

new bootstrap.Modal(document.getElementById('profileModal')).show();
}

/* Booking */
function openBooking(name){
document.getElementById("bookDoc").innerText = "Book Appointment with " + name;
new bootstrap.Modal(document.getElementById('bookingModal')).show();
}

function confirmBooking(){
alert("✅ Appointment Booked Successfully!");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
